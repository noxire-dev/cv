<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Glass Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#0A0A0A',
                        surface: 'rgba(255, 255, 255, 0.03)',
                        surfaceHover: 'rgba(255, 255, 255, 0.08)',
                        border: 'rgba(255, 255, 255, 0.1)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "framer-motion": "https://esm.sh/framer-motion@10.16.4",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #0A0A0A;
            color: #FFFFFF;
            overflow-x: hidden;
            cursor: none; /* Custom cursor */
        }
        ::selection {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .text-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, rgba(255, 255, 255, 0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useScroll, useTransform, AnimatePresence } from 'framer-motion';
        import { ArrowRight, Github, Twitter, Linkedin, Mail, ExternalLink, Code2, Terminal } from 'lucide-react';

        const CustomCursor = () => {
            const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });
            const [isHovering, setIsHovering] = useState(false);

            useEffect(() => {
                const updateMousePosition = (e) => {
                    setMousePosition({ x: e.clientX, y: e.clientY });
                };
                
                const handleMouseOver = (e) => {
                    if (e.target.tagName.toLowerCase() === 'button' || 
                        e.target.tagName.toLowerCase() === 'a' ||
                        e.target.closest('button') ||
                        e.target.closest('a')) {
                        setIsHovering(true);
                    } else {
                        setIsHovering(false);
                    }
                };

                window.addEventListener('mousemove', updateMousePosition);
                window.addEventListener('mouseover', handleMouseOver);
                
                return () => {
                    window.removeEventListener('mousemove', updateMousePosition);
                    window.removeEventListener('mouseover', handleMouseOver);
                };
            }, []);

            return (
                <motion.div
                    className="fixed top-0 left-0 w-8 h-8 rounded-full border border-white/30 pointer-events-none z-50 flex items-center justify-center mix-blend-difference"
                    animate={{
                        x: mousePosition.x - 16,
                        y: mousePosition.y - 16,
                        scale: isHovering ? 1.5 : 1,
                        backgroundColor: isHovering ? 'rgba(255,255,255,1)' : 'rgba(255,255,255,0)'
                    }}
                    transition={{ type: "spring", stiffness: 500, damping: 28, mass: 0.5 }}
                >
                    <motion.div 
                        className="w-1 h-1 bg-white rounded-full"
                        animate={{
                            opacity: isHovering ? 0 : 1
                        }}
                    />
                </motion.div>
            );
        };

        const NavBar = () => {
            return (
                <motion.nav 
                    initial={{ y: -100, opacity: 0 }}
                    animate={{ y: 0, opacity: 1 }}
                    transition={{ duration: 0.8, ease: [0.16, 1, 0.3, 1] }}
                    className="fixed top-0 left-0 right-0 z-40 px-6 py-6 md:px-12 md:py-8 flex justify-between items-center mix-blend-difference"
                >
                    <div className="text-xl font-bold tracking-tighter">JX.</div>
                    <div className="hidden md:flex items-center gap-8 text-sm font-medium text-white/70">
                        <a href="#work" className="hover:text-white transition-colors cursor-none">Work</a>
                        <a href="#about" className="hover:text-white transition-colors cursor-none">About</a>
                        <a href="#contact" className="hover:text-white transition-colors cursor-none">Contact</a>
                    </div>
                </motion.nav>
            );
        };

        const Hero = () => {
            const { scrollY } = useScroll();
            const y = useTransform(scrollY, [0, 1000], [0, 300]);
            const opacity = useTransform(scrollY, [0, 400], [1, 0]);

            return (
                <section className="relative h-screen flex flex-col justify-center px-6 md:px-12 overflow-hidden">
                    <motion.div style={{ y, opacity }} className="max-w-5xl z-10">
                        <motion.div
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.8, delay: 0.2 }}
                            className="inline-flex items-center gap-2 px-3 py-1 rounded-full glass-panel text-xs font-mono mb-8 text-white/70"
                        >
                            <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                            Available for new opportunities
                        </motion.div>
                        
                        <motion.h1 
                            initial={{ opacity: 0, y: 40 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 1, delay: 0.3, ease: [0.16, 1, 0.3, 1] }}
                            className="text-6xl md:text-8xl lg:text-9xl font-semibold tracking-tighter leading-[0.9] text-gradient mb-8"
                        >
                            Crafting digital<br/>experiences.
                        </motion.h1>

                        <motion.p 
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ duration: 1, delay: 0.6 }}
                            className="text-lg md:text-xl text-white/50 max-w-xl font-light"
                        >
                            Senior Frontend Engineer & Product Designer specializing in building exceptional, cinematic interfaces.
                        </motion.p>
                    </motion.div>

                    <motion.div 
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        transition={{ delay: 1.5, duration: 1 }}
                        className="absolute bottom-12 left-6 md:left-12 flex items-center gap-4 text-xs font-mono text-white/40"
                    >
                        <span>SCROLL</span>
                        <div className="w-12 h-[1px] bg-white/20 relative overflow-hidden">
                            <motion.div 
                                className="absolute top-0 left-0 w-full h-full bg-white"
                                animate={{ x: ['-100%', '100%'] }}
                                transition={{ repeat: Infinity, duration: 1.5, ease: "linear" }}
                            />
                        </div>
                    </motion.div>

                    {/* Ambient Glow */}
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] bg-blue-500/10 rounded-full blur-[120px] pointer-events-none -z-10" />
                </section>
            );
        };

        const Projects = () => {
            const projects = [
                { title: 'Neural Engine UI', category: 'Web App', year: '2026' },
                { title: 'Aura Design System', category: 'Library', year: '2025' },
                { title: 'Onyx Financial', category: 'Platform', year: '2025' }
            ];

            return (
                <section id="work" className="py-32 px-6 md:px-12">
                    <div className="mb-16 md:mb-32">
                        <h2 className="text-sm font-mono text-white/50 mb-4">SELECTED WORK (03)</h2>
                    </div>

                    <div className="flex flex-col gap-8 md:gap-12">
                        {projects.map((project, i) => (
                            <motion.div 
                                key={i}
                                initial={{ opacity: 0, y: 50 }}
                                whileInView={{ opacity: 1, y: 0 }}
                                viewport={{ once: true, margin: "-100px" }}
                                transition={{ duration: 0.8, ease: [0.16, 1, 0.3, 1] }}
                                className="group relative w-full aspect-[4/3] md:aspect-[21/9] glass-panel rounded-3xl overflow-hidden cursor-none"
                            >
                                {/* Background Image placeholder */}
                                <div className="absolute inset-0 bg-white/[0.02] group-hover:bg-white/[0.05] transition-colors duration-500" />
                                
                                <div className="absolute inset-0 p-8 flex flex-col justify-between z-10">
                                    <div className="flex justify-between items-start">
                                        <div className="text-white/50 font-mono text-sm">{project.category}</div>
                                        <div className="text-white/50 font-mono text-sm">{project.year}</div>
                                    </div>
                                    
                                    <div className="flex justify-between items-end">
                                        <h3 className="text-4xl md:text-6xl font-medium tracking-tight transform group-hover:-translate-y-2 transition-transform duration-500">{project.title}</h3>
                                        <div className="w-12 h-12 rounded-full glass-panel flex items-center justify-center opacity-0 group-hover:opacity-100 transform translate-y-4 group-hover:translate-y-0 transition-all duration-500">
                                            <ArrowRight size={20} />
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        ))}
                    </div>
                </section>
            );
        };

        const Stack = () => {
            const skills = [
                "React", "Next.js", "TypeScript", "TailwindCSS", "Framer Motion", "Three.js", "WebGL", "Figma", "Node.js", "GraphQL"
            ];

            return (
                <section className="py-32 px-6 md:px-12 overflow-hidden border-y border-white/5 relative">
                    <div className="flex gap-4 items-center mb-16">
                        <Terminal size={16} className="text-white/50" />
                        <h2 className="text-sm font-mono text-white/50">TECH STACK</h2>
                    </div>
                    
                    <div className="flex flex-wrap gap-4 relative z-10">
                        {skills.map((skill, i) => (
                            <motion.div 
                                key={i}
                                initial={{ opacity: 0, scale: 0.9 }}
                                whileInView={{ opacity: 1, scale: 1 }}
                                viewport={{ once: true }}
                                transition={{ duration: 0.5, delay: i * 0.05 }}
                                className="glass-panel px-6 py-3 rounded-full text-lg text-white/80 hover:text-white hover:bg-white/10 transition-colors cursor-none"
                            >
                                {skill}
                            </motion.div>
                        ))}
                    </div>
                </section>
            );
        };

        const Footer = () => {
            return (
                <footer id="contact" className="py-32 px-6 md:px-12 relative overflow-hidden">
                    <div className="max-w-5xl relative z-10">
                        <h2 className="text-5xl md:text-8xl font-semibold tracking-tighter mb-12">
                            Let's build something <br/>
                            <span className="text-white/40">extraordinary.</span>
                        </h2>
                        
                        <div className="flex flex-col md:flex-row gap-8 md:gap-16">
                            <a href="mailto:hello@example.com" className="text-xl md:text-3xl border-b border-white/20 pb-2 hover:border-white transition-colors inline-block w-fit cursor-none">
                                hello@example.com
                            </a>
                            
                            <div className="flex gap-6">
                                <a href="#" className="w-12 h-12 rounded-full glass-panel flex items-center justify-center hover:bg-white hover:text-black transition-colors cursor-none">
                                    <Github size={20} />
                                </a>
                                <a href="#" className="w-12 h-12 rounded-full glass-panel flex items-center justify-center hover:bg-white hover:text-black transition-colors cursor-none">
                                    <Twitter size={20} />
                                </a>
                                <a href="#" className="w-12 h-12 rounded-full glass-panel flex items-center justify-center hover:bg-white hover:text-black transition-colors cursor-none">
                                    <Linkedin size={20} />
                                </a>
                            </div>
                        </div>
                    </div>
                    
                    <div className="mt-32 pt-8 border-t border-white/10 flex justify-between text-sm font-mono text-white/40 relative z-10">
                        <span>© 2026</span>
                        <span>Design & Developed by JX</span>
                    </div>

                    <div className="absolute bottom-0 right-0 w-[50vw] h-[50vw] bg-blue-500/10 rounded-full blur-[150px] pointer-events-none -z-10 translate-x-1/4 translate-y-1/4" />
                </footer>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen selection:bg-white/20 selection:text-white pb-12">
                    <CustomCursor />
                    <NavBar />
                    <Hero />
                    <Projects />
                    <Stack />
                    <Footer />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
